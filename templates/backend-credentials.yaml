{{- $b := .Values.serviceAccount.backend -}}
{{- if and (eq $b.gkeAuthMethod "workload-identity") $b.wif.credentialsConfig }}
{{/*
  ConfigMap consumed by the backend pod. Mounted at
  /etc/workload-identity/credential-configuration.json with
  GOOGLE_APPLICATION_CREDENTIALS pointing at it.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-backend-gcp-configuration" .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
data:
  credential-configuration.json: |
{{ $b.wif.credentialsConfig | indent 4 }}
{{- end }}
{{- if and (eq $b.gkeAuthMethod "static-json") $b.staticJson.credentials (not $b.staticJson.credentialsSecret) }}
---
{{/*
  Secret holding a static GCP service-account key for the backend pod. Only
  rendered when no pre-existing secret name was supplied via
  serviceAccount.backend.staticJson.credentialsSecret.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backend-gcp-credentials" .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
type: Opaque
stringData:
  credentials.json: |
{{ $b.staticJson.credentials | indent 4 }}
{{- end }}
