{{- $backend := .Values.serviceAccount.backend -}}
{{- $workloads := .Values.serviceAccount.workloads -}}
{{/* Backend service account (runs the API + provisions workload pods) */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $backend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
  {{- if and (eq $backend.gkeAuthMethod "gke-native") $backend.native.gkeServiceAccountName }}
  annotations:
    iam.gke.io/gcp-service-account: {{ $backend.native.gkeServiceAccountName | quote }}
  {{- end }}
{{- with .Values.imagePullSecret }}
imagePullSecrets:
  - name: {{ . }}
{{- end }}
---
{{/* Workload service account (used by spawned MCP server pods) */}}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  name: {{ $workloads.name }}
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
  {{- if and (eq $workloads.gkeAuthMethod "gke-native") $workloads.native.gkeServiceAccountName }}
  annotations:
    iam.gke.io/gcp-service-account: {{ $workloads.native.gkeServiceAccountName | quote }}
  {{- end }}
{{- with .Values.imagePullSecret }}
imagePullSecrets:
  - name: {{ . }}
{{- end }}
---
{{/* Role granting the backend permission to manage workload resources
     (pods, deployments, services, configmaps, secrets, PVCs, ingresses)
     in the workload namespace. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-deployer
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
{{/* Bind the backend service account (in the release namespace) to the
     pod-deployer Role in the workload namespace. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-can-deploy-mcpservers
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $backend.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: pod-deployer
  apiGroup: rbac.authorization.k8s.io
