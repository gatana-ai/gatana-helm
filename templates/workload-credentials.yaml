{{- $w := .Values.serviceAccount.workloads -}}
{{- if and (eq $w.gkeAuthMethod "workload-identity") $w.wif.credentialsConfig }}
{{/*
  ConfigMap consumed by spawned workload pods. The backend mounts this at
  /etc/workload-identity/credential-configuration.json and points
  GOOGLE_APPLICATION_CREDENTIALS at it.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-workload-configuration
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
data:
  credential-configuration.json: |
{{ $w.wif.credentialsConfig | indent 4 }}
{{- end }}
{{- if and (eq $w.gkeAuthMethod "static-json") $w.staticJson.credentials (not $w.staticJson.credentialsSecret) }}
---
{{/*
  Secret holding a static GCP service-account key, consumed by spawned
  workload pods. Only rendered when no pre-existing secret name was supplied
  via serviceAccount.workloads.staticJson.credentialsSecret.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-workload-gcp-credentials" .Release.Name }}
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
type: Opaque
stringData:
  credentials.json: |
{{ $w.staticJson.credentials | indent 4 }}
{{- end }}
