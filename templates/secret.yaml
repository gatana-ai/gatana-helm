{{- /*
  Always render this Secret so other env-vars (licenseKey, smtpPassword, etc.)
  can reference it regardless of whether the Postgres password lives in a
  user-managed `postgres.existingSecret`. The postgresPassword key is only
  written here when no existing Secret is being used.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
type: Opaque
stringData:
{{- if not .Values.postgres.existingSecret }}
  postgresPassword: {{ required "postgres.password is required (or set postgres.existingSecret)" .Values.postgres.password | quote }}
{{- end }}
{{- if .Values.licenseKey }}
  licenseKey: {{ .Values.licenseKey | quote }}
{{- end }}
{{- with .Values.email.smtp.password }}
  smtpPassword: {{ . | quote }}
{{- end }}
{{- with .Values.email.ses.awsSecretAccessKey }}
  sesSecretAccessKey: {{ . | quote }}
{{- end }}
{{- /* Ensure the Secret is valid even when no string data was added. */}}
{{- if and .Values.postgres.existingSecret (not .Values.licenseKey) (not .Values.email.smtp.password) (not .Values.email.ses.awsSecretAccessKey) }}
  placeholder: ""
{{- end }}
