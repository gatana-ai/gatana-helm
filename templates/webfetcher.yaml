apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web-fetcher
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
    app.kubernetes.io/component: web-fetcher
spec:
  replicas: {{ .Values.webFetcher.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web-fetcher
  template:
    metadata:
      labels:
{{ include "gatana.podLabels" . | indent 8 }}
        app.kubernetes.io/component: web-fetcher
    spec:
      {{- include "gatana.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - { name: tmp, emptyDir: {} }
      containers:
        - name: web-fetcher
          image: {{ include "gatana.image" (dict "Values" .Values "Chart" .Chart "component" "webFetcher") }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          ports: [{ containerPort: 8080, name: http }]
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
          resources:
            {{- toYaml .Values.webFetcher.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-fetcher
  namespace: {{ .Values.workloadNamespace }}
  labels:
{{ include "gatana.labels" . | indent 4 }}
    app.kubernetes.io/component: web-fetcher
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web-fetcher
  ports: [{ name: http, port: 80, targetPort: 8080 }]
  type: ClusterIP
